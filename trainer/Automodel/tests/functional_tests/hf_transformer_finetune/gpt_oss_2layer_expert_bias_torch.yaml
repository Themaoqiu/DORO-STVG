step_scheduler:
  global_batch_size: 8
  local_batch_size: 4
  ckpt_every_steps: 1000
  val_every_steps: 2
  num_epochs: 1

dist_env:
  backend: nccl
  timeout_minutes: 5

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.models.gpt_oss.configuration_gpt_oss.GptOssConfig
    architectures: [GptOssForCausalLM]
    vocab_size: 51200
    hidden_size: 128
    intermediate_size: 256
    num_attention_heads: 4
    num_key_value_heads: 4
    head_dim: 32
    num_hidden_layers: 2
    max_position_embeddings: 256
    rms_norm_eps: 1.0e-6
    sliding_window: null
    layer_types: ["full_attention", "full_attention"]
    num_local_experts: 4
    num_experts_per_tok: 2
    router_aux_loss_coef: 0.01
    rope_scaling:
      rope_type: yarn
      factor: 32.0
      beta_fast: 32.0
      beta_slow: 1.0
      truncate: false
      original_max_position_embeddings: 256
    torch_dtype: bfloat16
    use_cache: false
  trust_remote_code: true
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: flex
    linear: torch
    rms_norm: torch_fp32
    experts: torch
    dispatcher: torch
    fake_balanced_gate: true
    enable_hf_state_dict_adapter: false

checkpoint:
  enabled: false
  checkpoint_dir: /tmp/checkpoints/
  model_save_format: safetensors
  save_consolidated: false

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 2

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 1
    round_virtual_stages_to_pp_multiple: up
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.squad.make_squad_dataset
  dataset_name: rajpurkar/squad
  split: train
  tokenizer:
    pretrained_model_name_or_path: Qwen/Qwen3-30B-A3B

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.squad.make_squad_dataset
  dataset_name: rajpurkar/squad
  split: validation
  limit_dataset_samples: 64
  tokenizer:
    pretrained_model_name_or_path: Qwen/Qwen3-30B-A3B

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  batch_size: 4

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.95]
  eps: 1e-7
  lr: 5.0e-4
  weight_decay: 0.0
