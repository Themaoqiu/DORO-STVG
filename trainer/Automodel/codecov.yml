        if_ci_failed: error
        if_not_found: success
        paths:
          - "nemo_automodel/_transformers/retrieval.py"
          - "nemo_automodel/recipes/retrieval/**"
          - "nemo_automodel/components/datasets/llm/retrieval_*.py"
