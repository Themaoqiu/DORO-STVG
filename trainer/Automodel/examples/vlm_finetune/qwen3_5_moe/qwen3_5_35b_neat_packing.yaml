# Qwen3.5-MoE-35B-A3B VLM fine-tuning with EP=4 PP=2 and neat packing.
#
# Based on the working qwen3_5_35b.yaml EP=4 PP=2 config with packed_sequence
# added. Requires transformers >= 5.3.0 (Qwen3.5-MoE support).
#
# torchrun --nproc-per-node=8 examples/vlm_finetune/finetune.py \
#   --config examples/vlm_finetune/qwen3_5_moe/qwen3_5_35b_neat_packing.yaml

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 32
  local_batch_size: 2
  ckpt_every_steps: 1000
  val_every_steps: 100
  num_epochs: 2
  max_steps: 100

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3.5-35B-A3B
  attn_implementation: flash_attention_2
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: sdpa
    linear: torch
    rms_norm: torch_fp32
    rope_fusion: false
    enable_deepep: true
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true

processor:
  _target_: transformers.AutoProcessor.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3.5-35B-A3B

checkpoint:
  enabled: false
  checkpoint_dir: /checkpoints/qwen3_5_35b_packed/
  model_save_format: safetensors
  save_consolidated: false

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 2
  dp_replicate_size: 1
  ep_size: 4

  sequence_parallel: false

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 1
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    layers_per_stage: 10
    patch_inner_model: false
    patch_causal_lm_model: false

freeze_config:
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: train

packed_sequence:
  pretokenize: true
  max_length: 2048
  pack_size: 2048
  collate_max_length: 2048
  packing_ratio: 0.9
  drop_long_samples: true

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 0
  pin_memory: true
  drop_last: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: validation

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 1
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.default_collate_fn
    max_length: 2048

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 5.0e-6
  weight_decay: 0.1

ci:
  time: "00:15:00"

