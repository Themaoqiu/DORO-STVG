# Joint multi-step (recurrent) MTP fine-tuning of Gemma 4 4B (E4B) base + the
# released drafter (google/gemma-4-E4B-it-assistant) on MedPix VQA.
#
# The drafter runs K = drafter_num_steps autoregressive rounds per training batch.
#
# The base runs ONCE and shared_kv_states is reused at every round (per the
# Gemma 4 drafter blog: the drafter cross-attends to the target's KV cache
# rather than building its own). Loss is the sum of K shifted-label cross-
# entropies. The recipe handles the per-step label shift via
# ``_shift_labels_left`` already.
#
# torchrun --nproc-per-node=8 examples/vlm_finetune/finetune.py \
#     -c examples/vlm_finetune/gemma4/gemma4_4b_joint_drafter_multi_step.yaml
#
# Requires: transformers>=5.8.0.dev

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 500
  val_every_steps: 500
  num_epochs: 2

dist_env:
  backend: nccl
  timeout_minutes: 10

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.components.models.gemma4_drafter.composite.Gemma4WithDrafter.from_pretrained
  pretrained_model_name_or_path: google/gemma-4-E4B-it
  drafter_path: google/gemma-4-E4B-it-assistant
  # Joint training knobs. drafter_loss_weight = 0.01. Cleaner descent than 0.1; the drafter's gradient through
  # the shared-KV path destabilizes the base at higher weight.
  drafter_loss_weight: 0.01
  # Memory: each extra round is one more drafter forward (~5% of the base) plus its activations for backward.
  # Drop to K=2 or K=3 if activation memory is tight; bump to K=5+ if you want longer drafted runs at inference
  drafter_num_steps: 4
  # Base 4B needs ``text_config.use_cache: true`` so the DynamicCache is
  # allocated inside HF's forward (same as gemma4_4b.yaml). Without it the
  # sliding-window attention mask path silently degrades (SDPA mask-skip
  # collapses sliding layers into plain causal attention), inflating the
  # initial training loss. Orthogonal to KV-sharing -- that goes through
  # ``shared_kv_states``, not ``past_key_values``.
  text_config:
    use_cache: true
  torch_dtype: torch.bfloat16
  use_liger_kernel: true
  use_sdpa_patching: false
  attn_implementation: eager

processor:
  padding_side: right

checkpoint:
  enabled: true
  checkpoint_dir: vlm_checkpoints/gemma4_4b_joint_drafter_multi_step/
  model_save_format: safetensors
  save_consolidated: true

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  sequence_parallel: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: train[:1000]

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 0
  pin_memory: true
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.default_collate_fn

validation_dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: validation[:500]

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader

optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

# Set 10% of total steps (250) as warmup steps. Without warmup SFT on the joint base + drafter setup will spike.
# The drafter's gradients flowing back into ``base.k_proj`` / ``v_proj`` at the
# store layers destabilize the base in the first few hundred steps if you
# skip warmup; loss decreases monotonically once warmup is added).
# For longer multi-epoch runs (e.g. ~2000+ total steps) bump warmup_steps to 200
# Note on K-scaling: at K > 1 the drafter contributes K cross-entropy terms
# instead of 1, but the recipe's ``drafter_loss_weight = 0.01`` gates the
# full sum, so the effective per-step weight is 0.01 (not 0.01 * K). If
# you see early base-loss spikes when bumping K, bump warmup to 50 first
# before lowering drafter_loss_weight.
lr_scheduler:
  lr_warmup_steps: 25
  lr_decay_style: cosine

freeze_config:
  # Embeddings must stay trainable: the drafter consumes the base's token
  # embeddings via its pre_projection input at EVERY round, so freezing them
  # would block gradient flow from the drafter loss to the base.
  freeze_embeddings: false
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

