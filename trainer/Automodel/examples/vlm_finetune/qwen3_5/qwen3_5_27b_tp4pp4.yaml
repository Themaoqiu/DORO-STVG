# TP4+PP4 on 2 nodes (16 GPUs): tp=4, pp=4, dp=1. global_batch=4, local_batch=4
# Submit via slurm: sbatch sub_qwen35_27b_tp4pp4.sh

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 32
  local_batch_size: 4
  ckpt_every_steps: 2000
  val_every_steps: 500
  num_epochs: 10
  max_steps: 30

dist_env:
  backend: nccl
  timeout_minutes: 10

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3.5-27B
  attn_implementation: sdpa

processor:
  _target_: transformers.AutoProcessor.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3.5-27B

checkpoint:
  enabled: false

distributed:
  _target_: nemo_automodel.components.distributed.fsdp2.FSDP2Manager
  tp_size: 4
  cp_size: 1
  pp_size: 4
  dp_replicate_size: 1
  ep_size: 1
  sequence_parallel: false
  activation_checkpointing: true
  defer_fsdp_grad_sync: false

  pipeline:
    pp_schedule: 1f1b
    pp_microbatch_size: 1
    scale_grads_in_schedule: false
    round_virtual_stages_to_pp_multiple: up
    dtype: bf16

freeze_config:
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: train

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 0
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.default_collate_fn

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 1.0e-5
  weight_decay: 0.1

