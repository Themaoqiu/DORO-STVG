#
# Full StepFun Step3.7/Step3.5-VL MedPix fine-tune.
# Layout follows the Qwen3-VL-235B benchmark recipe: EP32 + PP4.

recipe: FinetuneRecipeForVLM

seed: 1234

step_scheduler:
  global_batch_size: 512
  local_batch_size: 8
  ckpt_every_steps: 100
  val_every_steps: 25
  log_remote_every_steps: 1
  gc_every_steps: 10
  max_steps: 100

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: stepfun-ai/Step-3.7-Flash
  trust_remote_code: false
  torch_dtype: bfloat16
  text_config:
    # Keep standard finetuning MTP-free by default. Set to 3 to enable
    # Step3.7 MTP training with the auxiliary loss below, for example:
    #   --model.text_config.num_nextn_predict_layers=3
    num_nextn_predict_layers: 0
  # Keep finetuning conservative unless explicitly reproducing MTP pretraining.
  # Override this with --model.mtp_loss_scaling_factor=<factor> if needed.
  mtp_loss_scaling_factor: 0.1
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: torch_fp32
    rope_fusion: false
    experts: gmm
    dispatcher: deepep
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

processor:
  _target_: nemo_automodel.components.models.step3p7.processing_step3.Step3VLProcessor.from_pretrained
  pretrained_model_name_or_path: stepfun-ai/Step-3.7-Flash
  trust_remote_code: false

checkpoint:
  enabled: true
  checkpoint_dir: vlm_checkpoints/step3p7_medpix_ep32pp4/
  model_save_format: safetensors
  save_consolidated: false

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 4
  ep_size: 32
  sequence_parallel: false
  activation_checkpointing: true
  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 1
    layers_per_stage: 2
    round_virtual_stages_to_pp_multiple: down
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false
  moe:
    reshard_after_forward: false
    wrap_outer_model: true

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_audio_tower: true
  freeze_language_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy
  fp32_upcast: false

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: train

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 2
  persistent_workers: true
  pin_memory: true
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.default_collate_fn
    max_length: 2048
  drop_last: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: validation[:256]

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 1
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.default_collate_fn
    max_length: 2048

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 1.0e-5
  weight_decay: 0.1

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 1.0e-6

wandb:
  project: <your_wandb_project>
  entity: <your_wandb_entity>
  name: <your_wandb_name>
  dir: <your_wandb_save_dir>
