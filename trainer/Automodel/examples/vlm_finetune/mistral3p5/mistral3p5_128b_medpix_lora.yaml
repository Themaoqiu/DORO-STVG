# =============================================================================
# Mistral-3.5 medium 128B VLM LoRA fine-tune on MedPix.
# LoRA target: 8 nodes x 8 H100-80GB = 64 GPUs, TP=8 PP=8, DP=1.
# FP8-native Mistral Medium 3.5 currently dequantizes to BF16 when PEFT is
# enabled. TP=8 PP=8 lowers both per-rank text-layer load and attention
# activation pressure for 2K multimodal sequences.
# Vision tower + multi_modal_projector are frozen; LoRA is applied to the
# language model linear layers.
# =============================================================================

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 16
  local_batch_size: 8
  ckpt_every_steps: 500
  val_every_steps: 500
  num_epochs: 1
  max_steps: 100

dist_env:
  backend: nccl
  timeout_minutes: 30

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: mistralai/Mistral-Medium-3.5-128B
  torch_dtype: torch.bfloat16
  attn_implementation: eager

processor:
  _target_: transformers.AutoProcessor.from_pretrained
  pretrained_model_name_or_path: mistralai/Mistral-Medium-3.5-128B

peft:
  _target_: nemo_automodel.components._peft.lora.PeftConfig
  match_all_linear: False
  exclude_modules:
    - "*vision_tower*"
    - "*vision*"
    - "*visual*"
    - "*image_encoder*"
    - "*lm_head*"
    - "*audio*"
  dim: 8
  alpha: 32
  use_triton: True

checkpoint:
  enabled: false
  checkpoint_dir: vlm_checkpoints/mistral3p5_128b_medpix_lora/
  model_save_format: safetensors
  save_consolidated: false

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 8
  cp_size: 1
  pp_size: 8
  ep_size: 1

  sequence_parallel: false
  activation_checkpointing: true
  defer_fsdp_grad_sync: false

  pipeline:
    pp_schedule: 1f1b
    pp_microbatch_size: 1
    scale_grads_in_schedule: false

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_language_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: train

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 1
  pin_memory: true
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.default_collate_fn
    max_length: 2048
  drop_last: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_medpix_dataset
  path_or_dataset: mmoukouba/MedPix-VQA
  split: validation

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 1
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.default_collate_fn
    max_length: 2048

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.999]
  eps: 1e-8
  lr: 1.0e-4
  weight_decay: 0

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 1.0e-6

