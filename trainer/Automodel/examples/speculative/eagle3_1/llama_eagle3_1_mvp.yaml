recipe: TrainEagle3Recipe

# Single-GPU MVP variant of the EAGLE-3.1 Llama recipe. Mirrors
# ``examples/speculative/eagle3/llama_eagle3_mvp.yaml`` exactly except the
# EAGLE-3.1 toggles ``fc_norm`` and ``norm_output`` are both set, applying
# the EAGLE-3.1 architectural changes from
# https://github.com/vllm-project/vllm/pull/42764 to the Llama-style draft.
# Intended for smoke-testing the EAGLE-3.1 code path with a small target
# model (Llama-3.2-1B) and a tiny dataset slice; not a production recipe.

dist_env:
  backend: nccl
  timeout_minutes: 30

recipe_args:
  target_model_name_or_path: meta-llama/Llama-3.2-1B
  # ``train_data_path`` accepts either a HF dataset id or a local
  # ``.jsonl`` / directory of ``.jsonl`` files. Each row must follow the
  # OpenAI chat schema -- ``ChatDataset`` keys on a ``messages`` list of
  # ``{role, content}`` entries.
  train_data_path: /path/to/train.jsonl
  val_data_path: null
  train_split: null
  val_split: null
  output_dir: ./outputs/eagle3_1_llama_mvp
  seq_length: 1024
  micro_batch_size: 1
  grad_accumulation_steps: 1
  num_workers: 0
  num_epochs: 1
  ttt_steps: 4
  draft_vocab_size: 8192
  freeze_embeddings: true

  # EAGLE-3.1 architectural toggles (the smoke test).
  fc_norm: true
  norm_output: true

  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 10
  max_grad_norm: 1.0

optimizer:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0

checkpoint:
  enabled: true
  checkpoint_dir: ./outputs/eagle3_1_llama_mvp/checkpoints
  model_save_format: safetensors
  save_consolidated: true
  # restore_from: LATEST  # set to "LATEST", a subdir name like "epoch_1_step_100", or an absolute path
