recipe: TrainEagle3Recipe

# EAGLE-3.1 variant of the Llama PerfectBlend recipe. Identical to
# ``examples/speculative/eagle3/llama_eagle3_perfectblend.yaml`` except
# the two drafter-side toggles ``fc_norm`` and ``norm_output`` are set,
# applying the EAGLE-3.1 architectural changes described in
# https://github.com/vllm-project/vllm/pull/42764 to the Llama-style
# draft. The MLA-backbone community release
# ``lightseekorg/kimi-k2.6-eagle3.1-mla`` is a different architecture
# (``Eagle3DeepseekV2ForCausalLM``) and is not produced by this recipe.
# Both flags can be controlled independently; setting only one is a
# valid (intermediate) configuration.

dist_env:
  backend: nccl
  timeout_minutes: 60

recipe_args:
  target_model_name_or_path: meta-llama/Llama-3.1-8B-Instruct

  # ``frankleeeee/PerfectBlend-Regenerated-Llama-3.1-8B-Instruct`` ships its
  # turns under a ``conversations`` column instead of ``messages``. ChatDataset
  # now auto-converts a ``conversations`` column (ShareGPT ``{from, value}`` or
  # OpenAI ``{role, content}``) into the ``messages`` schema, so the dataset can
  # be pointed at directly -- no local column rename needed.
  train_data_path: frankleeeee/PerfectBlend-Regenerated-Llama-3.1-8B-Instruct
  val_data_path: null

  train_split: "train[:200000]"
  val_split: null

  output_dir: ./outputs/eagle3_1_llama_perfectblend

  seq_length: 2048

  micro_batch_size: 1
  grad_accumulation_steps: 4
  num_workers: 4

  num_epochs: 1

  ttt_steps: 4
  draft_vocab_size: 32000
  freeze_embeddings: true

  # EAGLE-3.1 architectural toggles. ``fc_norm`` adds a per-chunk RMSNorm
  # on the auxiliary hidden states before ``model.fc``; ``norm_output``
  # routes the final ``model.norm`` over the per-step hidden state so the
  # next TTT step consumes the post-norm state. See
  # ``components/speculative/eagle/draft_llama.py`` for details.
  fc_norm: true
  norm_output: true

  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 20
  max_grad_norm: 1.0

optimizer:
  lr: 2.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_ratio: 0.05
  min_lr_ratio: 0.1
