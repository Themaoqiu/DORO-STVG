# EAGLE-3 draft training for openai/gpt-oss-20b.
#
# The frozen gpt-oss MoE target is loaded co-located and supplies online
# supervision (aux hidden states + logits); the draft is the Llama-style
# ``GptOssEagle3DraftModel``, which reproduces gpt-oss's YaRN RoPE so the draft
# stays positionally consistent with the target (see
# ``components/speculative/eagle/draft_gpt_oss.py``). Because the 20B MoE target
# does not comfortably share a single GPU with the draft, the target is
# expert-parallel sharded via the ``distributed:`` block below.
#
# To run (8 GPUs):
#   automodel examples/speculative/eagle3/gpt_oss_20b_eagle3.yaml --nproc-per-node 8

recipe: TrainEagle3Recipe

dist_env:
  backend: nccl
  timeout_minutes: 60

recipe_args:
  target_model_name_or_path: openai/gpt-oss-20b

  # Any conversation dataset works -- the gpt-oss target generates the EAGLE-3
  # supervision online, so the dataset only supplies the prompt/turn text. The
  # gpt-oss tokenizer applies its Harmony chat template automatically. For the
  # best draft quality, use data whose assistant turns were generated by
  # gpt-oss itself (matching the deployment distribution), as SpecForge does
  # with its gpt-oss-regenerated PerfectBlend split.
  train_data_path: frankleeeee/PerfectBlend-Regenerated-Llama-3.1-8B-Instruct
  val_data_path: null
  train_split: "train[:200000]"
  val_split: null

  output_dir: ./outputs/eagle3_gpt_oss_20b

  # gpt-oss's original (pre-YaRN) context is 4096; the draft trains within it so
  # no RoPE extension is needed.
  seq_length: 4096

  # 8 GPUs * micro_batch=1 * grad_accum=4 -> effective batch 32.
  micro_batch_size: 1
  grad_accumulation_steps: 4
  num_workers: 4

  num_epochs: 1

  ttt_steps: 4
  # gpt-oss has a 201088-token vocabulary; shrink the draft head to the 32k
  # most frequent tokens seen in the training data (the rest fall back to the
  # target at inference time).
  draft_vocab_size: 32000
  freeze_embeddings: true

  # aux_layer_ids defaults to [1, num_layers//2 - 1, num_layers - 4]; leave it
  # unset to let the recipe pick the low/mid/high triplet for gpt-oss-20b.

  trust_remote_code: false
  shuffle_seed: 42
  log_every_steps: 20
  max_grad_norm: 1.0

# Expert-parallel shard the frozen gpt-oss MoE target across the 8 GPUs so it
# fits alongside the draft. The draft itself is small and replicated (DDP).
distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 8
  sequence_parallel: false

optimizer:
  # The TTT loss is a weighted *mean* across steps, so this LR is invariant to
  # ``ttt_steps`` and the decay constant. Tune it on convergence, not loss scale.
  lr: 2.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_ratio: 0.05
  min_lr_ratio: 0.1
