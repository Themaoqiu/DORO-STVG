model:
  pretrained_model_name_or_path: "Qwen/Qwen-Image"
  mode: "pretrain"
  cache_dir: null
  attention_backend: "flash"
  torch_dtype: float32
  compute_dtype: bfloat16

  pipeline_spec:
    transformer_cls: "QwenImageTransformer2DModel"
    subfolder: "transformer"
    load_full_pipeline: false

optim:
  learning_rate: 2e-5

  optimizer:
    _target_: torch.optim.AdamW
    weight_decay: 0.01
    betas: [0.9, 0.999]

lr_scheduler:
  lr_decay_style: cosine
  lr_warmup_steps: 0
  min_lr: 1e-6

fsdp:
  dp_size: 8
  tp_size: 1
  cp_size: 1
  pp_size: 1
  activation_checkpointing: false
  cpu_offload: false

flow_matching:
  adapter_type: "qwen_image"
  adapter_kwargs:
    guidance_scale: 1
    use_guidance_embeds: false
  timestep_sampling: "uniform"
  logit_mean: 0.0
  logit_std: 1.0
  flow_shift: 1.0
  mix_uniform_ratio: 0.1
  sigma_min: 0.0
  sigma_max: 1.0
  num_train_timesteps: 1000
  i2v_prob: 0.0
  #Critical: use_loss_weighting needs to be false for pretraining
  use_loss_weighting: false
  log_interval: 100
  summary_log_interval: 10

step_scheduler:
  num_epochs: 500000
  local_batch_size: 1
  global_batch_size: 8
  ckpt_every_steps: 1000
  log_every: 1

data:
  dataloader:
    _target_: nemo_automodel.components.datasets.diffusion.build_text_to_image_multiresolution_dataloader
    cache_dir: PATH_TO_YOUR_DATA
    train_text_encoder: false
    num_workers: 2
    # Supported resolutions include [256x256], [512x512], and [1024x1024].
    base_resolution: [256, 256]
    dynamic_batch_size: false
    shuffle: true
    drop_last: false

checkpoint:
  enabled: true
  checkpoint_dir: PATH_TO_YOUR_CKPT_DIR
  model_save_format: safetensors
  save_consolidated: final
  diffusers_compatible: true
  restore_from:

wandb:
  project: qwen-image-pretraining
  mode: online
  name: qwen_image_pretrain_run_1

dist_env:
  backend: "nccl"
  init_method: "env://"

seed: 42
