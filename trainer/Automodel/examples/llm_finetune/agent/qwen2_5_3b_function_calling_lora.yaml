# Multi-turn agent SFT (LoRA) on Qwen2.5-3B with the
# llamafactory/glaive_toolcall_en function-calling dataset.
#
# To run this recipe:
#   automodel examples/llm_finetune/agent/qwen2_5_3b_function_calling_lora.yaml --nproc-per-node 1
# A single 24GB GPU should fit this configuration.

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 16
  local_batch_size: 1
  ckpt_every_steps: 500
  val_every_steps: 500
  max_steps: 2000

dist_env:
  backend: nccl
  timeout_minutes: 1

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen2.5-3B
  attn_implementation: sdpa
  # Required by FusedLinearCrossEntropy below, which consumes hidden states
  # directly instead of materializing the full [bsz, seq_len, vocab] logits.
  output_hidden_states: true

peft:
  _target_: nemo_automodel.components._peft.lora.PeftConfig
  match_all_linear: True
  dim: 16
  alpha: 16
  use_triton: True

compile:
  enabled: false
  mode: "default"
  fullgraph: false
  dynamic: true
  backend: null

clip_grad_norm:
  max_norm: 1.0

distributed:
  strategy: fsdp2
  dp_size: none
  cp_size: 1
  sequence_parallel: false

loss_fn:
  # See companion full-SFT yaml for rationale; MaskedCrossEntropy OOMs on
  # Qwen2.5 vocab=151936 with seq_length=4096 even on 8x80GB.
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.agent_chat.make_agent_chat_dataset
  dataset_name: llamafactory/glaive_toolcall_en
  split: train
  # NOTE: seq_length only caps length when truncation is enabled (or pads when
  # padding: max_length). With the defaults it does NOT truncate, so long
  # dialogues pass through uncapped. Add `truncation: true` to enforce the cap.
  seq_length: 4096
  # Drop the oldest conversation turns (keeping the system message, tools, and
  # the final answer) when a dialogue exceeds seq_length, instead of token-level
  # truncation that would clip away the supervised final turn. Off by default.
  # truncate_history: true
  tokenizer:
    pretrained_model_name_or_path: Qwen/Qwen2.5-3B

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.agent_chat.make_agent_chat_dataset
  dataset_name: llamafactory/glaive_toolcall_en
  split: train[:256]
  limit_dataset_samples: 256
  seq_length: 4096
  tokenizer:
    pretrained_model_name_or_path: Qwen/Qwen2.5-3B

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater

# See companion full-SFT yaml for explanation. Disabled-by-omission;
# uncomment-and-edit this block to enable on LoRA runs.
# tool_call_eval:
#   _target_: nemo_automodel.components.eval.tool_call_evaluator.ToolCallAccuracyEvaluator
#   dataset_name: llamafactory/glaive_toolcall_en
#   split: train[:128]
#   max_eval_samples: 128
#   max_new_tokens: 256
#   max_prompt_tokens: 3584

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1.0e-8
  lr: 2.0e-4
  weight_decay: 0.0

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 1.0e-6

nvtx: false
