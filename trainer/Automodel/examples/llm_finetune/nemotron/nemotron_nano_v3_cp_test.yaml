# NemotronV3 CP parity test: THD collater, no packing, TE attention
# Run with cp_size=1 (8 GPUs) then cp_size=2 (8 GPUs) and compare losses.
#
# CP=1:
#   torchrun --nproc-per-node=8 examples/llm_finetune/finetune.py \
#     --config examples/llm_finetune/nemotron/nemotron_nano_v3_cp_test.yaml \
#     --distributed.cp_size 1 --distributed.ep_size 8
#
# CP=2:
#   torchrun --nproc-per-node=8 examples/llm_finetune/finetune.py \
#     --config examples/llm_finetune/nemotron/nemotron_nano_v3_cp_test.yaml \
#     --distributed.cp_size 2 --distributed.ep_size 4

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 9999
  val_every_steps: 9999
  max_steps: 10

dist_env:
  backend: nccl
  timeout_minutes: 5

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
  trust_remote_code: true
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 2
  pp_size: 1
  ep_size: 4
  sequence_parallel: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: train

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater
  shuffle: false

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.999]
  eps: 1e-8
  lr: 1.0e-5
  weight_decay: 0

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 1.0e-6

checkpoint:
  enabled: false
